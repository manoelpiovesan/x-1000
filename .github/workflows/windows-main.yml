name: Build Windows EXE

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Ableton Link SDK exists
        shell: bash
        run: |
          set -e

          # Some repos reference ableton-link as submodule but have broken/missing .gitmodules.
          # Fallback: clone SDK directly when not present.
          if [ ! -f "ableton-link/include/ableton/Link.hpp" ]; then
            rm -rf ableton-link
            git clone --depth 1 https://github.com/Ableton/link.git ableton-link
          fi

          # Ensure nested SDK submodules (asio-standalone, etc.) are present.
          git -C ableton-link submodule update --init --recursive

      - name: Ensure third_party dependencies exist
        shell: bash
        run: |
          set -e

          mkdir -p third_party

          if [ ! -f "third_party/imgui/imgui.cpp" ]; then
            rm -rf third_party/imgui
            git clone --depth 1 https://github.com/ocornut/imgui.git third_party/imgui
          fi

          if [ ! -f "third_party/miniaudio.h" ]; then
            curl -L --fail https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h -o third_party/miniaudio.h
          fi

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-rtmidi
            mingw-w64-ucrt-x86_64-rubberband

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake --preset ableton-link-windows

      - name: Build
        shell: msys2 {0}
        run: |
          cmake --build --preset ableton-link-windows

      - name: Test
        shell: msys2 {0}
        run: |
          ctest --preset ableton-link-windows

      - name: Package EXE and runtime DLLs
        shell: msys2 {0}
        run: |
          set -e
          rm -rf dist
          mkdir -p dist

          cp build-windows/xpad_link.exe dist/
          cp build-windows/xpad_link_tests.exe dist/

          # Try to copy dependent runtime DLLs from UCRT64.
          # If ntldd is unavailable for any reason, keep at least the executables.
          if command -v ntldd >/dev/null 2>&1; then
            ntldd -R dist/xpad_link.exe | awk '/ucrt64\\/bin\\/.*\\.dll/ {print $3}' | sort -u > dlls.txt || true
            if [ -f dlls.txt ]; then
              while IFS= read -r dll; do
                [ -f "$dll" ] && cp "$dll" dist/ || true
              done < dlls.txt
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpad-link-windows
          path: dist/




